name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v2
      with:
        version: 4.6.2
        include-templates: true

    - name: Build
      run: |
        ./build.sh all

    - name: Create Release Archives
      run: |
        mkdir -p dist
        zip -r dist/snake-web.zip out/html/
        zip -r dist/snake-windows.zip out/win64/
        zip -r dist/snake-linux.zip out/linux64/

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          dist/snake-web.zip
          dist/snake-windows.zip
          dist/snake-linux.zip
